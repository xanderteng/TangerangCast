name: TangerangCast Continuous Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Setiap hari Minggu tengah malam
  workflow_dispatch:

jobs:
  weekly-training:
    name: Weekly Model Retrain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup SSH Key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Data Sync Step 1 - Pull Historical Baseline from VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p data/processed
          # Mengambil baseline yang sudah terupdate dari VPS, bukan dari Google Drive
          scp $SSH_USER@$SSH_HOST:~/TangerangCast/data/processed/ProcessedHistoric.csv data/processed/

      - name: Data Sync Step 2 - Pull Live Data from VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p data/raw/current
          scp -r $SSH_USER@$SSH_HOST:~/TangerangCast/data/raw/current/* data/raw/current/

      - name: Execute Training (Local MLflow Logging)
        env:
          MLFLOW_TRACKING_URI: file:///mlflow
        run: |
          # Membuat folder lokal untuk log MLflow (tanpa SSH tunnel)
          sudo mkdir -p /mlflow
          sudo chmod 777 /mlflow
          
          # Mengeksekusi script core training machine learning
          python src/train.py

      - name: Ship Models & Updated Historical Data to VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # 1. Kirim model ONNX baru ke direktori models di VPS
          scp models/*.onnx $SSH_USER@$SSH_HOST:~/TangerangCast/models/
          
          # 2. Kirim ProcessedHistoric.csv yang sudah diupdate oleh train.py kembali ke VPS
          scp data/processed/ProcessedHistoric.csv $SSH_USER@$SSH_HOST:~/TangerangCast/data/processed/
