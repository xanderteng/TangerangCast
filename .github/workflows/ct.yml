name: TangerangCast Continuous Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Setiap hari Minggu tengah malam
  workflow_dispatch:

jobs:
  weekly-training:
    name: Weekly Model Retrain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup SSH Key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Pre-Flight Check (Test SCP & MLflow Artifacts)
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: |
          echo "1. Testing SCP Access..."
          echo "scp_ok" > preflight.txt
          scp preflight.txt $SSH_USER@$SSH_HOST:~/preflight.txt
          
          echo "2. Testing MLflow Tunnel & Artifact Upload..."
          ssh -i ~/.ssh/id_rsa -o ServerAliveInterval=30 -M -S-control-socket -fnNT -L 5000:127.0.0.1:5000 $SSH_USER@$SSH_HOST
          sleep 3
          
          # Script inline ini akan langsung CRASH jika VPS belum memakai --serve-artifacts
          python -c "
          import mlflow, sys
          try:
              mlflow.set_tracking_uri('http://127.0.0.1:5000')
              mlflow.set_experiment('Preflight_V2')
              with mlflow.start_run():
                  with open('preflight.txt', 'w') as f:
                      f.write('artifact_ok')
                  mlflow.log_artifact('preflight.txt')
              print('SUCCESS: MLflow and SCP are fully functional.')
          except Exception as e:
              print(f'PRE-FLIGHT FAILED: {e}')
              sys.exit(1)
          "
          
          # Tutup tunnel setelah testing selesai
          ssh -S-control-socket -O exit $SSH_USER@$SSH_HOST

      - name: Data Sync Step 1 - Pull Historical Baseline from VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p data/processed
          scp $SSH_USER@$SSH_HOST:~/TangerangCast/data/processed/ProcessedHistoric.csv data/processed/

      - name: Data Sync Step 2 - Pull Live Data from VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p data/raw/current
          scp -r $SSH_USER@$SSH_HOST:~/TangerangCast/data/raw/current/* data/raw/current/

      - name: Execute Training (Dengan Otomatisasi SSH Tunneling MLflow)
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: |
          # Membuka jembatan tunnel
          ssh -i ~/.ssh/id_rsa -o ServerAliveInterval=30 -M -S-control-socket -fnNT -L 5000:127.0.0.1:5000 $SSH_USER@$SSH_HOST
          
          # Mengeksekusi script core training machine learning
          python src/train.py
          
          # Menutup socket control tunnel
          ssh -S-control-socket -O exit $SSH_USER@$SSH_HOST

      - name: Ship Models & Updated Historical Data to VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp models/*.onnx $SSH_USER@$SSH_HOST:~/TangerangCast/models/
          scp data/processed/ProcessedHistoric.csv $SSH_USER@$SSH_HOST:~/TangerangCast/data/processed/
